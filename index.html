<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智汇订单管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f6f8fb 0%, #e9effd 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .gradient-btn {
            background: linear-gradient(90deg, #4f46e5 0%, #3b82f6 100%);
            transition: all 0.3s ease;
        }

        .gradient-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* 隐藏滚动条但保留功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .animate-in {
            animation: fadeInScale 0.4s ease-out forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- 头部导航 -->
        <header class="flex justify-between items-center mb-10 px-2">
            <div>
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-blue-500">
                    OrderHub
                </h1>
                <p class="text-xs text-gray-500 font-medium">智能订单处理终端</p>
            </div>
            <nav class="flex space-x-2 bg-white/50 p-1 rounded-full border border-white/50">
                <button onclick="switchTab('submit')" id="tab-submit" class="px-6 py-2 rounded-full text-sm font-semibold transition-all duration-300 bg-white shadow-sm text-indigo-600">
                    数据提交
                </button>
                <button onclick="switchTab('admin')" id="tab-admin" class="px-6 py-2 rounded-full text-sm font-semibold transition-all duration-300 text-gray-600 hover:text-indigo-600">
                    管理后台
                </button>
            </nav>
        </header>

        <!-- 提交区域 -->
        <main id="view-submit" class="animate-in">
            <div class="max-w-md mx-auto">
                <div class="glass-card p-8 rounded-3xl">
                    <div class="mb-8">
                        <h2 class="text-xl font-bold text-gray-800">新建提交</h2>
                        <p class="text-sm text-gray-400">请录入支付链接及关联订单号</p>
                    </div>

                    <form id="submissionForm" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-600 ml-1">订单链接</label>
                            <input type="text" id="link" placeholder="必须包含 alipay 字符" 
                                class="w-full px-4 py-3.5 rounded-2xl border-0 bg-white shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-gray-300" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-600 ml-1">订单编号</label>
                            <input type="text" id="orderId" placeholder="请输入订单号" 
                                class="w-full px-4 py-3.5 rounded-2xl border-0 bg-white shadow-inner focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-gray-300" required>
                        </div>
                        <button type="submit" id="submitBtn" class="w-full gradient-btn text-white font-bold py-4 rounded-2xl shadow-lg mt-4">
                            确认并提交
                        </button>
                    </form>
                </div>
            </div>
        </main>

        <!-- 管理后台 (初始隐藏) -->
        <main id="view-admin" class="hidden animate-in">
            <!-- 密码锁屏 -->
            <div id="admin-auth" class="max-w-md mx-auto text-center py-20">
                <div class="glass-card p-8 rounded-3xl">
                    <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">身份验证</h2>
                    <p class="text-sm text-gray-400 mb-6">请输入管理员密码以继续</p>
                    <input type="password" id="adminPwd" placeholder="输入密码 (默认 admin888)" 
                        class="w-full px-4 py-3 rounded-xl border-gray-100 bg-gray-50 mb-4 text-center outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="verifyAdmin()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold">解锁进入</button>
                </div>
            </div>

            <!-- 数据控制台 -->
            <div id="admin-dashboard" class="hidden">
                <div class="glass-card rounded-3xl overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 class="text-xl font-bold text-gray-800">订单数据中心</h2>
                            <p class="text-sm text-gray-400">当前已采集 <span id="data-count" class="font-bold text-indigo-600">0</span> 条记录</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="generateReport('links')" class="px-4 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-50 transition-all flex items-center">
                                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                整理链接
                            </button>
                            <button onclick="generateReport('all')" class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 transition-all flex items-center shadow-md">
                                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                整理全部
                            </button>
                        </div>
                    </div>

                    <div class="overflow-x-auto hide-scrollbar">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50/50">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">提交时间</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">订单号</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">链接详情</th>
                                    <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable" class="divide-y divide-gray-100">
                                <!-- JS加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 模态框组件 (教程/成功/导出) -->
    <div id="modal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full p-8 shadow-2xl transform transition-all">
            <div id="modal-icon" class="mb-4"></div>
            <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2"></h3>
            <div id="modal-body" class="text-gray-500 mb-8 overflow-y-auto max-h-[60vh]"></div>
            <div id="modal-footer">
                <button onclick="closeModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 py-3 rounded-2xl font-bold transition-all">关闭</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'alipay-order-v2';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        let orders = [];
        const ADMIN_PASSWORD = "admin888"; // 你可以在这里修改密码

        // 认证
        const start = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, u => {
                user = u;
                if (u) listenData();
            });
        };
        start();

        function listenData() {
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'orders'));
            onSnapshot(q, snapshot => {
                orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                               .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderTable();
                document.getElementById('data-count').innerText = orders.length;
            });
        }

        // 提交逻辑
        const form = document.getElementById('submissionForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const link = document.getElementById('link').value.trim();
            const orderId = document.getElementById('orderId').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!link.toLowerCase().includes('alipay')) {
                showModal('教程：如何获取正确链接', `
                    <div class="bg-indigo-50 p-4 rounded-2xl mb-4 border border-indigo-100">
                        <p class="text-indigo-700 text-sm font-medium">链接检测失败！提交的内容必须包含 "alipay"。</p>
                    </div>
                    <ul class="space-y-3 text-sm">
                        <li class="flex items-start"><span class="w-5 h-5 bg-indigo-500 text-white rounded-full flex-shrink-0 flex items-center justify-center text-[10px] mt-0.5 mr-2">1</span> <span>打开支付宝账单详情。</span></li>
                        <li class="flex items-start"><span class="w-5 h-5 bg-indigo-500 text-white rounded-full flex-shrink-0 flex items-center justify-center text-[10px] mt-0.5 mr-2">2</span> <span>点击页面下方的“投诉与帮助”或右上角分享链接。</span></li>
                        <li class="flex items-start"><span class="w-5 h-5 bg-indigo-500 text-white rounded-full flex-shrink-0 flex items-center justify-center text-[10px] mt-0.5 mr-2">3</span> <span>复制生成的以 https://render.alipay.com/ 开头的链接。</span></li>
                    </ul>
                `, 'error');
                return;
            }

            btn.disabled = true;
            btn.innerText = "提交中...";

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
                    link, orderId, timestamp: serverTimestamp()
                });
                showModal('提交成功', '我们已收到您的订单信息，请耐心等待处理。', 'success');
                form.reset();
            } catch (err) {
                showModal('系统错误', '请检查网络连接后重试。', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = "确认并提交";
            }
        };

        // 后台权限
        window.verifyAdmin = () => {
            const pwd = document.getElementById('adminPwd').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('admin-auth').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
            } else {
                alert('密码错误！');
            }
        };

        window.switchTab = (tab) => {
            const isSubmit = tab === 'submit';
            document.getElementById('view-submit').classList.toggle('hidden', !isSubmit);
            document.getElementById('view-admin').classList.toggle('hidden', isSubmit);
            
            const btnSub = document.getElementById('tab-submit');
            const btnAdm = document.getElementById('tab-admin');
            
            btnSub.className = isSubmit 
                ? "px-6 py-2 rounded-full text-sm font-semibold transition-all duration-300 bg-white shadow-sm text-indigo-600" 
                : "px-6 py-2 rounded-full text-sm font-semibold transition-all duration-300 text-gray-600 hover:text-indigo-600";
            btnAdm.className = !isSubmit 
                ? "px-6 py-2 rounded-full text-sm font-semibold transition-all duration-300 bg-white shadow-sm text-indigo-600" 
                : "px-6 py-2 rounded-full text-sm font-semibold transition-all duration-300 text-gray-600 hover:text-indigo-600";
        };

        function renderTable() {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = orders.map(item => `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="px-6 py-4 text-xs text-gray-400 font-mono">
                        ${item.timestamp ? new Date(item.timestamp.seconds * 1000).toLocaleString('zh-CN', {hour12:false}).slice(5, -3) : 'Loading...'}
                    </td>
                    <td class="px-6 py-4 text-sm font-bold text-gray-700">${item.orderId}</td>
                    <td class="px-6 py-4 text-sm text-blue-500 truncate max-w-[200px] font-mono">${item.link}</td>
                    <td class="px-6 py-4">
                        <button onclick="deleteItem('${item.id}')" class="text-red-400 hover:text-red-600 text-xs font-bold">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        window.deleteItem = async (id) => {
            if (confirm('确定删除此记录吗？')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id));
            }
        };

        window.generateReport = (type) => {
            if (orders.length === 0) return alert('暂无数据');
            
            let text = "";
            if (type === 'links') {
                text = orders.map(o => o.link).join('\n');
            } else {
                text = orders.map(o => `${o.orderId} | ${o.link}`).join('\n');
            }

            showModal('整理结果', `
                <p class="text-xs mb-2">已为您生成纯文本内容：</p>
                <textarea id="reportText" class="w-full h-48 bg-gray-50 p-4 rounded-2xl text-xs font-mono border-0 focus:ring-1 focus:ring-indigo-500 outline-none">${text}</textarea>
                <button onclick="copyText()" id="copyBtn" class="w-full bg-indigo-600 text-white py-3 rounded-2xl mt-4 font-bold">复制到剪贴板</button>
            `, 'report');
        };

        window.copyText = () => {
            const el = document.getElementById('reportText');
            el.select();
            document.execCommand('copy');
            const btn = document.getElementById('copyBtn');
            btn.innerText = "复制成功！";
            btn.className = "w-full bg-green-500 text-white py-3 rounded-2xl mt-4 font-bold";
            setTimeout(() => {
                btn.innerText = "复制到剪贴板";
                btn.className = "w-full bg-indigo-600 text-white py-3 rounded-2xl mt-4 font-bold";
            }, 2000);
        };

        window.showModal = (title, body, mode) => {
            const modal = document.getElementById('modal');
            const mTitle = document.getElementById('modal-title');
            const mBody = document.getElementById('modal-body');
            const mIcon = document.getElementById('modal-icon');

            mTitle.innerText = title;
            mBody.innerHTML = body;

            if (mode === 'success') {
                mIcon.innerHTML = `<div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></div>`;
            } else if (mode === 'error') {
                mIcon.innerHTML = `<div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>`;
            } else {
                mIcon.innerHTML = `<div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>`;
            }

            modal.classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
        };
    </script>
</body>
</html>
