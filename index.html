<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单内容提交</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 主容器 -->
    <div class="w-full max-w-md glass-morphism rounded-2xl shadow-xl p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">提交订单信息</h1>
            <p class="text-sm text-gray-500 mt-2">请确保信息填写准确以便快速处理</p>
        </div>

        <form id="submissionForm" class="space-y-5">
            <!-- 链接输入 -->
            <div>
                <label for="link" class="block text-sm font-medium text-gray-700 mb-1">提交链接</label>
                <input 
                    type="text" 
                    id="link" 
                    placeholder="请输入包含 alipay 的链接" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    required
                >
            </div>

            <!-- 订单号输入 -->
            <div>
                <label for="orderId" class="block text-sm font-medium text-gray-700 mb-1">订单号</label>
                <input 
                    type="text" 
                    id="orderId" 
                    placeholder="请输入您的订单号" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
                    required
                >
            </div>

            <!-- 提交按钮 -->
            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-md transform active:scale-95 transition-all"
            >
                立即提交
            </button>
        </form>
    </div>

    <!-- 操作教程弹窗 (Modal) -->
    <div id="tutorialModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl max-w-sm w-full p-6 shadow-2xl">
            <div class="flex items-center text-amber-500 mb-4">
                <svg class="w-8 h-8 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <h3 class="text-xl font-bold text-gray-800">链接格式错误</h3>
            </div>
            <div class="text-gray-600 space-y-3 mb-6">
                <p class="font-semibold text-gray-700">操作教程：</p>
                <ul class="list-disc list-inside space-y-2 text-sm">
                    <li>请确保您提交的是支付宝相关链接。</li>
                    <li>链接中必须包含关键字符 <span class="bg-amber-100 text-amber-700 px-1 rounded font-mono">alipay</span>。</li>
                    <li>示例：https://render.alipay.com/xxx</li>
                </ul>
            </div>
            <button 
                onclick="closeModal('tutorialModal')" 
                class="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 rounded-lg transition-colors"
            >
                我知道了
            </button>
        </div>
    </div>

    <!-- 成功提示弹窗 -->
    <div id="successModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl max-w-sm w-full p-6 shadow-2xl text-center">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">提交成功</h3>
            <p class="text-gray-500 mb-6">您的订单信息已成功记录</p>
            <button 
                onclick="closeModal('successModal')" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 rounded-lg transition-colors"
            >
                确定
            </button>
        </div>
    </div>

    <script>
        const form = document.getElementById('submissionForm');
        const linkInput = document.getElementById('link');
        const orderInput = document.getElementById('orderId');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const linkValue = linkInput.value.trim();
            const orderValue = orderInput.value.trim();

            // 逻辑判断：必须包含 alipay
            if (linkValue.toLowerCase().includes('alipay')) {
                // 成功逻辑
                showModal('successModal');
                console.log('提交成功:', { link: linkValue, orderId: orderValue });
                form.reset();
            } else {
                // 失败逻辑：弹出教程
                showModal('tutorialModal');
            }
        });

        function showModal(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        // 点击遮罩层关闭弹窗
        window.onclick = function(event) {
            if (event.target.classList.contains('bg-opacity-50')) {
                event.target.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
