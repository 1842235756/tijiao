```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderHub | 订单管理终端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gradient:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
            filter: brightness(1.1);
        }

        .btn-gradient:disabled { opacity: 0.6; cursor: not-allowed; }

        .animate-fade-up {
            animation: fadeUp 0.5s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- 导航头部 -->
        <nav class="flex justify-between items-center mb-10">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-800">OrderHub</h1>
                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">v2.5 Stable</span>
                </div>
            </div>
            
            <div class="bg-gray-200/50 p-1 rounded-2xl flex">
                <button onclick="switchView('submit')" id="tab-submit" class="px-5 py-2 rounded-xl text-sm font-bold transition-all bg-white shadow-sm text-indigo-600">提交中心</button>
                <button onclick="switchView('admin')" id="tab-admin" class="px-5 py-2 rounded-xl text-sm font-bold transition-all text-gray-500 hover:text-indigo-600">管理后台</button>
            </div>
        </nav>

        <!-- 提交界面 -->
        <section id="view-submit" class="animate-fade-up max-w-md mx-auto">
            <div class="glass-card rounded-[2.5rem] p-10">
                <div class="mb-8 text-center">
                    <h2 class="text-2xl font-bold text-gray-800">录入新订单</h2>
                    <p class="text-sm text-gray-400 mt-1">请输入支付链接与关联订单号</p>
                </div>

                <form id="submissionForm" class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">支付链接</label>
                        <input type="text" id="link" placeholder="必须包含 alipay 字符" required
                            class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-0 outline-none text-gray-700 focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">订单编号</label>
                        <input type="text" id="orderId" placeholder="请输入订单号" required
                            class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-0 outline-none text-gray-700 focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <button type="submit" id="submitBtn" class="w-full btn-gradient text-white font-bold py-4 rounded-2xl shadow-lg mt-4 flex items-center justify-center space-x-2">
                        <span>立即提交数据</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- 管理后台 -->
        <section id="view-admin" class="hidden animate-fade-up">
            <div id="auth-wall" class="max-w-md mx-auto pt-10">
                <div class="glass-card rounded-[2.5rem] p-10 text-center">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">安全验证</h2>
                    <p class="text-sm text-gray-400 mb-8">管理区域需要身份验证</p>
                    <input type="password" id="adminPwd" placeholder="请输入管理密码" 
                        class="w-full px-5 py-4 rounded-2xl bg-gray-50 text-center border-0 outline-none mb-6 focus:ring-2 focus:ring-indigo-500">
                    <button onclick="verifyAccess()" class="w-full bg-gray-800 text-white font-bold py-4 rounded-2xl hover:bg-gray-900">解锁后台</button>
                </div>
            </div>

            <div id="admin-panel" class="hidden">
                <div class="glass-card rounded-[2rem] overflow-hidden">
                    <div class="p-8 border-b border-gray-100 flex justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">数据管理</h2>
                            <p class="text-sm text-gray-400">已采集: <span id="count" class="font-bold text-indigo-600">0</span></p>
                        </div>
                        <button onclick="exportData()" class="px-6 py-3 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-lg">导出全部</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50/50">
                                <tr>
                                    <th class="px-8 py-4 text-[10px] font-bold text-gray-400 uppercase">时间</th>
                                    <th class="px-8 py-4 text-[10px] font-bold text-gray-400 uppercase">单号</th>
                                    <th class="px-8 py-4 text-[10px] font-bold text-gray-400 uppercase">链接</th>
                                    <th class="px-8 py-4 text-[10px] font-bold text-gray-400 uppercase">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 弹窗 -->
    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2rem] max-w-lg w-full p-10 shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-bold text-gray-800 mb-2"></h3>
            <div id="modal-body" class="text-gray-500 mb-8 max-h-[50vh] overflow-y-auto"></div>
            <button onclick="closeModal()" class="w-full bg-gray-100 py-4 rounded-2xl font-bold">确定</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- 核心配置 ---
        // 如果你在 GitHub 使用，需要申请自己的 Firebase 配置并贴在这里
        let firebaseConfig;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' 
                ? JSON.parse(__firebase_config) 
                : { /* 这里填入你的真实 Firebase 配置 */ };
        } catch(e) {
            console.error("Config missing");
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'alipay-v3-prod';
        const ADMIN_PWD = "admin888"; 

        let db, auth, currentUser, dataList = [];

        // 初始化
        if (firebaseConfig && firebaseConfig.apiKey) {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            signInAnonymously(auth);
            onAuthStateChanged(auth, u => { if(u) { currentUser = u; syncData(); } });
        } else {
            console.warn("Firebase 未配置");
        }

        function syncData() {
            if(!db) return;
            onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'orders')), snap => {
                dataList = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                               .sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                renderTable();
                document.getElementById('count').innerText = dataList.length;
            });
        }

        // 提交
        document.getElementById('submissionForm').onsubmit = async (e) => {
            e.preventDefault();
            const link = document.getElementById('link').value.trim();
            const orderId = document.getElementById('orderId').value.trim();

            if (!link.toLowerCase().includes('alipay')) {
                showModal('操作教程', '链接必须包含 "alipay"。请从支付宝账单详情页复制链接。');
                return;
            }

            if (!db) {
                showModal('配置错误', '检测到你尚未配置 Firebase 数据库。请联系开发者配置后台。');
                return;
            }

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
                    link, orderId, timestamp: serverTimestamp()
                });
                showModal('成功', '订单已提交并同步至后台。');
                e.target.reset();
            } catch(err) {
                showModal('失败', '提交失败，请检查网络或配置。');
            }
        };

        // UI 函数
        window.switchView = (view) => {
            const isSubmit = view === 'submit';
            document.getElementById('view-submit').style.display = isSubmit ? 'block' : 'none';
            document.getElementById('view-admin').style.display = isSubmit ? 'none' : 'block';
            
            document.getElementById('tab-submit').className = isSubmit ? "px-5 py-2 rounded-xl text-sm font-bold bg-white shadow-sm text-indigo-600" : "px-5 py-2 rounded-xl text-sm font-bold text-gray-500";
            document.getElementById('tab-admin').className = !isSubmit ? "px-5 py-2 rounded-xl text-sm font-bold bg-white shadow-sm text-indigo-600" : "px-5 py-2 rounded-xl text-sm font-bold text-gray-500";
        };

        window.verifyAccess = () => {
            if (document.getElementById('adminPwd').value === ADMIN_PWD) {
                document.getElementById('auth-wall').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else { alert('密码错误'); }
        };

        window.renderTable = () => {
            document.getElementById('dataTable').innerHTML = dataList.map(i => `
                <tr class="hover:bg-gray-50">
                    <td class="px-8 py-4 text-xs text-gray-400">${i.timestamp ? '已同步' : '同步中'}</td>
                    <td class="px-8 py-4 text-sm font-bold">${i.orderId}</td>
                    <td class="px-8 py-4 text-sm text-indigo-500 truncate max-w-[150px]">${i.link}</td>
                    <td class="px-8 py-4"><button onclick="del('${i.id}')" class="text-red-400 text-xs">删除</button></td>
                </tr>
            `).join('');
        };

        window.del = async (id) => { if(confirm('删除？')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id)); };

        window.exportData = () => {
            const text = dataList.map(i => `${i.orderId} ---- ${i.link}`).join('\n');
            showModal('数据导出', `<textarea class="w-full h-48 p-4 bg-gray-50 rounded-xl text-xs font-mono">${text}</textarea>`);
        };

        window.showModal = (t, b) => {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-body').innerHTML = b;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
    </script>
</body>
</html>
